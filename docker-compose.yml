# ===========================================
# Docker Compose - Proyecto Gestión Estudiantil
# ===========================================

services:
  # ---------------- BACKEND ----------------
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: backend-django
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    environment:
      - DEBUG=True
    volumes:
      - ./Backend:/app
    restart: unless-stopped
    networks:
      - app-network

  # ---------------- FRONTEND ----------------
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: frontend-angular
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # ---------------- NGINX PROXY ----------------
  # Este servicio es opcional - sirve como proxy reverso
  # Descomenta la sección de abajo si quieres un único punto de entrada
  
  # nginx:
  #   image: nginx:alpine
  #   container_name: nginx-proxy
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - backend
  #     - frontend
  #   restart: unless-stopped
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge